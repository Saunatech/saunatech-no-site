<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Redirecting to BookSauna Privacy Policy</title>
        <meta name="description" content="The canonical BookSauna Privacy Policy is hosted on booksauna.app." />
        <meta http-equiv="refresh" content="0; url=https://booksauna.app/privacy" />
        <link rel="canonical" href="https://booksauna.app/privacy" />
        <link rel="icon" href="favicon.ico" sizes="any" />
        <link rel="icon" type="image/png" href="icon.png" />
        <link rel="apple-touch-icon" href="apple-touch-icon.png" />
        <link rel="stylesheet" href="assets/css/main.css" />
    </head>
    <body>
        <main class="redirect-page">
            <section class="card">
                <h1>Privacy Policy</h1>
                <p>The canonical BookSauna Privacy Policy is hosted on booksauna.app.</p>
                <p><a class="button button-primary" href="https://booksauna.app/privacy">Open Privacy Policy</a></p>
            </section>
        </main>
    </body>
</html>
